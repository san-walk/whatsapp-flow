<!DOCTYPE html>
        <html>
        <body>
        
        <iframe id="frame" style="width:100%; height:600px; border:none;"></iframe>
        
        <script>
          const params = new URLSearchParams(window.location.search);
          const token = params.get("token");
          const flow_id = params.get("flow_id");
        
          if (!token) {
            document.body.innerHTML = "Token missing in URL";
            throw new Error("Token missing");
          }
        
          fetch(`http://127.0.0.1:5000/whatsapp-hook-flow/${flow_id}?token=${token}`)
            .then(res => res.json())
            .then(response => {
              const html = response.data.content;
              const apiToken = response.data.token || token;
        
              const finalHTML = `
                <script>
                  window.PARENT_TOKEN = ${JSON.stringify(apiToken)};
                  window.PARENT_FLOW_ID = ${JSON.stringify(flow_id)};
                <\/script>
              ` + html;
        
              const iframe = document.getElementById("frame");
              iframe.srcdoc = finalHTML;
            })
            .catch(err => {
              console.error(err);
              document.body.innerHTML = "Error loading form";
            });
        </script>
        
        </body>
        </html>
